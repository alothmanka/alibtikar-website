services:
  - type: web
    name: alibtikar-website
    env: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: alibtikar_db
          property: connectionString
    autoDeploy: true
    healthCheckPath: /
    
  - type: pserv
    name: alibtikar_db
    plan: free
    ipAllowList: []
